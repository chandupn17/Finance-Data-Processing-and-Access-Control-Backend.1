# Prisma requires MongoDB as a replica set. After `docker compose up -d`, run once on your machine:
#   mongosh "mongodb://127.0.0.1:27017" --eval 'rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "127.0.0.1:27017" }] })'
# Then use DATABASE_URL=mongodb://127.0.0.1:27017/finance_dashboard

services:
  mongodb:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
